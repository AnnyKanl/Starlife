<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人生蓝图 · 深度解析</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --ink: #1a1a1a;
            --gold: #b38b4d;
            --paper: #f9f6f2;
            --white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #e0e0e0;
            font-family: 'Noto Serif SC', serif;
            color: var(--ink);
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .main-container {
            max-width: 500px;
            width: 100%;
            background: var(--paper);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            min-height: 100vh;
            padding: 40px 25px;
            position: relative;
        }

        /* 表单样式 */
        .config-panel {
            background: var(--white);
            padding: 20px;
            border: 1px solid #ddd;
            margin-bottom: 30px;
        }

        h1 { font-family: 'Cormorant Garamond'; text-align: center; letter-spacing: 2px; margin-bottom: 30px; color: var(--gold); }

        .field { margin-bottom: 15px; }
        label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 10px; border: 1px solid #eee; background: var(--paper); outline: none; }
        input:focus { border-color: var(--gold); }

        .btn-main {
            width: 100%; padding: 15px; background: var(--ink); color: var(--white);
            border: none; cursor: pointer; letter-spacing: 2px; transition: 0.3s;
        }
        .btn-main:hover { background: var(--gold); }

        /* 报告样式 */
        #report-container {
            display: none;
            background: var(--paper);
            padding: 40px 30px;
            border: 1px solid #eee;
            position: relative;
        }

        .report-header { text-align: center; border-bottom: 2px solid var(--gold); padding-bottom: 20px; margin-bottom: 30px; }
        .report-header h2 { font-family: 'Cormorant Garamond'; font-size: 24px; }
        .report-header p { font-size: 12px; opacity: 0.6; margin-top: 5px; }

        .module-section { margin-bottom: 40px; }
        .module-title { color: var(--gold); font-weight: 600; margin-bottom: 15px; border-left: 3px solid var(--gold); padding-left: 10px; }
        .module-content { line-height: 2; font-size: 15px; text-align: justify; color: #333; }

        .report-footer { text-align: center; font-size: 10px; color: #aaa; margin-top: 50px; border-top: 1px solid #eee; padding-top: 20px; }

        /* 加载动画 */
        #loader { display: none; text-align: center; padding: 20px; color: var(--gold); font-style: italic; }

        /* 导出按钮 */
        #save-image-btn {
            display: none; width: 100%; padding: 15px; background: var(--gold); color: white;
            border: none; margin-top: 20px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="main-container">
    <h1>LIFE BLUEPRINT</h1>

    <div class="config-panel" id="input-panel">
        <div class="field"><label>姓名 / Name</label><input type="text" id="name" placeholder="输入称呼"></div>
        <div class="field"><label>日期 / Date</label><input type="date" id="date"></div>
        <div class="field"><label>时间 / Time</label><input type="time" id="time"></div>
        <div class="field"><label>出生城市 / City (英文名更准)</label><input type="text" id="city" placeholder="例如: Shanghai"></div>
        <div class="field"><label>DeepSeek Key</label><input type="password" id="key" placeholder="sk-..."></div>
        <button class="btn-main" onclick="run()">生成我的《人生蓝图》</button>
    </div>

    <div id="loader">正在调取宇宙能量数据，请稍候...</div>

    <div id="report-container">
        <div class="report-header">
            <h2 id="out-name">报告生成中</h2>
            <p id="out-meta">生命蓝图深度解析报告</p>
        </div>

        <div class="module-section">
            <div class="module-title">能量底色：深层特质</div>
            <div class="module-content" id="content-ego">...</div>
        </div>

        <div class="module-section">
            <div class="module-title">生命镜像：亲密关系</div>
            <div class="module-content" id="content-love">...</div>
        </div>

        <div class="module-section">
            <div class="module-title">印记源头：原生能量</div>
            <div class="module-content" id="content-karma">...</div>
        </div>

        <div class="report-footer">
            人生如逆旅，我亦是行人。<br>本报告基于深层能量逻辑推演，仅供参考。
        </div>
    </div>

    <button id="save-image-btn" onclick="takeScreenshot()">保存为精美长图 (可分享)</button>
</div>

<script>
    // --- 1. 获取经纬度 ---
    async function getCoords(city) {
        const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(city)}`);
        const d = await r.json();
        if(!d.length) throw new Error("无法识别城市，请尝试输入英文名。");
        return { lat: d[0].lat, lon: d[0].lon, name: d[0].display_name };
    }

    // --- 2. 获取印占天文数据 ---
    async function getAstroData(date, time, lat, lon) {
        const [y, m, d] = date.split('-');
        const url = `https://api.vedastro.org/Calculate/AllPlanetData/Location/${lon}/${lat}/Time/${time}/${d}/${m}/${y}/+08:00`;
        const r = await fetch(url);
        const j = await r.json();
        return j.Payload;
    }

    // --- 3. 调用 AI 解读 (去占星化提示词) ---
    async function getAI(key, name, data) {
        const prompt = `你是一位顶级的心理学导师和生命教练。我会给你一组结构化的生命能量原始数据。
        数据如下：${JSON.stringify(data).substring(0, 1500)}
        
        请为[${name}]撰写一份深度报告。
        **必须遵守的规则：**
        1. 严禁提到任何占星术汇（如：行星、星座、宫位、上升、相位、印度、排盘、大运）。
        2. 请把这些数据翻译成：深层性格、人际关系模式、潜意识里的家庭影响。
        3. 语气要优雅、神秘但科学、充满洞察力。
        4. 报告分为三部分：[核心特质]、[亲密关系]、[原生家庭印记]。
        
        请直接输出内容，不要任何开场白。`;

        const r = await fetch('https://api.deepseek.com/chat/completions', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${key}`},
            body: JSON.stringify({
                model: "deepseek-chat",
                messages: [{role: "user", content: prompt}],
                temperature: 0.7
            })
        });
        const d = await r.json();
        return d.choices[0].message.content;
    }

    // --- 主函数 ---
    async function run() {
        const key = document.getElementById('key').value;
        const city = document.getElementById('city').value;
        if(!key || !city) return alert("请填写完整信息。");

        document.getElementById('input-panel').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        try {
            const coords = await getCoords(city);
            const astro = await getAstroData(
                document.getElementById('date').value,
                document.getElementById('time').value,
                coords.lat, coords.lon
            );
            const report = await getAI(key, document.getElementById('name').value, astro);

            // 解析报告内容
            document.getElementById('out-name').textContent = document.getElementById('name').value + " 的人生蓝图";
            const parts = report.split('\n\n');
            document.getElementById('content-ego').textContent = parts[0] || "加载中...";
            document.getElementById('content-love').textContent = parts[1] || "加载中...";
            document.getElementById('content-karma').textContent = parts[2] || "加载中...";

            document.getElementById('loader').style.display = 'none';
            document.getElementById('report-container').style.display = 'block';
            document.getElementById('save-image-btn').style.display = 'block';

        } catch (e) {
            alert("错误: " + e.message);
            document.getElementById('input-panel').style.display = 'block';
            document.getElementById('loader').style.display = 'none';
        }
    }

    // --- 截图功能 ---
    function takeScreenshot() {
        const target = document.getElementById('report-container');
        html2canvas(target, {
            scale: 2, // 高清
            useCORS: true,
            backgroundColor: "#f9f6f2"
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = `Blueprint-${new Date().getTime()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>

</body>
</html>
