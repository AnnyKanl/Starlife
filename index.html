<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生命蓝图 · 宿命解析</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        :root { --gold: #b38b4d; --ink: #1a1a1a; --paper: #f9f6f2; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #d0d0d0; font-family: 'Noto Serif SC', serif; color: var(--ink); padding: 20px; display: flex; justify-content: center; }
        .main-container { max-width: 500px; width: 100%; background: var(--paper); box-shadow: 0 10px 50px rgba(0,0,0,0.3); padding: 40px 20px; min-height: 90vh; }
        .config-panel { background: #fff; padding: 25px; border: 1px solid #eee; margin-bottom: 25px; border-radius: 4px; }
        h1 { text-align: center; letter-spacing: 6px; margin-bottom: 30px; color: var(--gold); font-size: 24px; }
        .field { margin-bottom: 15px; }
        label { display: block; font-size: 11px; color: #999; margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border: 1px solid #eee; background: #fafafa; outline: none; font-size: 14px; }
        .btn-main { width: 100%; padding: 18px; background: var(--ink); color: #fff; border: none; cursor: pointer; letter-spacing: 2px; font-weight: 600; }
        #loader { display: none; text-align: center; padding: 30px; color: var(--gold); font-size: 14px; }
        #report-container { display: none; padding: 40px 20px; border: 1px solid #eee; background: var(--paper); }
        .report-header { text-align: center; border-bottom: 1.5px solid var(--gold); padding-bottom: 30px; margin-bottom: 40px; }
        .module-content { line-height: 2.2; font-size: 15px; color: #333; text-align: justify; margin-bottom: 25px; }
        #save-image-btn { display: none; width: 100%; padding: 18px; background: var(--gold); color: #fff; border: none; margin-top: 20px; cursor: pointer; font-weight: bold; }
        .status-msg { font-size: 10px; color: #ccc; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="main-container">
    <h1>LIFE BLUEPRINT</h1>
    
    <div class="config-panel" id="input-panel">
        <div class="field"><label>称呼</label><input type="text" id="name" placeholder="Name"></div>
        <div class="field"><label>出生日期</label><input type="date" id="date"></div>
        <div class="field"><label>准确时间</label><input type="time" id="time"></div>
        <div class="field"><label>出生城市</label><input type="text" id="city" placeholder="Shanghai / Sao Paulo"></div>
        <div class="field"><label>DeepSeek Key</label><input type="password" id="key" placeholder="sk-..."></div>
        <button class="btn-main" onclick="run()">生成蓝图报告</button>
    </div>

    <div id="loader">「 正在同步宇宙能量序列，请稍候 」</div>

    <div id="report-container">
        <div class="report-header">
            <h2 id="out-name" style="font-size: 26px; margin-bottom: 10px;"></h2>
            <p style="font-size: 12px; color: #999; letter-spacing: 2px;">生命蓝图 · 深度能量解析报告</p>
        </div>
        <div id="report-body"></div>
        <div style="text-align: center; font-size: 10px; color: #ccc; margin-top: 60px;">
            探索自我，是通往自由的唯一路径
        </div>
    </div>

    <button id="save-image-btn" onclick="takeScreenshot()">保存为精美长图</button>
    <div id="status-bar" class="status-msg">系统已就绪</div>
</div>

<script>
    const setStatus = (msg) => document.getElementById('status-bar').textContent = `系统状态: ${msg}`;

    // 本地保底算法：如果 API 全挂了，用这个算一个大致的星盘数据，保证 AI 能说话
    function getFallbackData(date, time) {
        const [y, m, d] = date.split('-').map(Number);
        return {
            source: "Local Engine",
            points: {
                "LifeCore": (y + m + d) % 12,
                "RelationMirror": (y * m) % 12,
                "RootEnergy": (d * 24) % 12
            }
        };
    }

    async function run() {
        const key = document.getElementById('key').value.trim();
        const city = document.getElementById('city').value.trim();
        const date = document.getElementById('date').value;
        const time = document.getElementById('time').value;

        if(!key || !city || !date || !time) return alert("请完整填写信息。");

        document.getElementById('input-panel').style.display = 'none';
        document.getElementById('loader').style.display = 'block';
        setStatus("定位中...");

        let astroData;

        try {
            // 1. 定位
            const geoResp = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(city)}`);
            const geoData = await geoResp.json();
            const lon = geoData.length ? parseFloat(geoData[0].lon).toFixed(4) : 121.47;
            const lat = geoData.length ? parseFloat(geoData[0].lat).toFixed(4) : 31.23;
            const offset = Math.round(lon / 15);
            const tz = (offset >= 0 ? "+" : "-") + Math.abs(offset).toString().padStart(2, '0') + ":00";

            // 2. 尝试获取 API 数据（带三层重试）
            setStatus("请求星辰服务器...");
            const [y, m, d] = date.split('-');
            const astroUrl = `https://api.vedastro.org/Calculate/AllPlanetData/PlanetName/All/Location/${lon}/${lat}/Time/${time}/${d}/${m}/${y}/${encodeURIComponent(tz)}`;
            
            try {
                // 第一尝试：直接请求
                let resp = await fetch(astroUrl, { signal: AbortSignal.timeout(5000) });
                if(!resp.ok) {
                    // 第二尝试：通过代理请求
                    setStatus("切换中继节点...");
                    resp = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(astroUrl)}`);
                    const proxyData = await resp.json();
                    astroData = JSON.parse(proxyData.contents).Payload;
                } else {
                    const json = await resp.json();
                    astroData = json.Payload;
                }
            } catch (e) {
                setStatus("激活本地引擎...");
                astroData = getFallbackData(date, time);
            }

            // 3. AI 解析
            setStatus("AI 深度解析中...");
            const prompt = `你是一位毒舌、冷峻、拥有上帝视角的【人类行为学算法专家】。
我会给你一组经过脱敏的生命原始逻辑数据（包含多层分盘的行星状态）：
${JSON.stringify(data).substring(0, 2000)}

你的任务是：基于这些底层代码，撰写一份让用户感到“脊背发凉”的深度解析报告。

**必须遵守的生存法则：**
1. **绝对禁言：** 严禁提到任何占星、命理术语（宫位、相位、XX星、XX座、上升、大运、分盘、印占等）。
2. **逻辑落地：** 不要说“你会有好运”，要说“你这种对细节的病态控制欲，是因为你继承了母系血脉里对匮乏的恐惧”。
3. **拒绝文艺：** 删掉“梦幻、宇宙、低语”这种废话。使用“算法、机制、遗传、代码、防御机制、行为惯性”这种硬核词汇。

**报告必须包含以下四个精准模块：**

### 1. 【亲密关系的底层捕食逻辑】
（基于第7宫、金星及D-9盘逻辑）：不要只说喜欢什么样的人。要分析他潜意识里在“寻找什么样的猎物”或“渴望被什么样的能量吞噬”。描述他最真实的伴侣偏好和他在关系中那个“连自己都觉得阴暗”的真实需求。

### 2. 【原生家庭的业力遗传代码】
（基于第4、9宫及D-40、D-45盘逻辑）：模仿用户提供的D-40案例。深度挖掘他从父系或母系血脉里继承的“底层心理代码”。分析他性格中那些极端的独立、冷酷、焦虑或强迫症，到底是在替哪一位祖先重复未完成的功课。

### 3. 【社会价值的生存位面】
（基于第10宫、AK星及D-10盘逻辑）：分析他最适合的“开疆拓土”的方式。不是职业建议（如当老师、当医生），而是能量模式（如：在危机中通过掌控他人获利、在极度孤独的枯燥中建立秩序、利用人性的漏洞进行精准打击等）。

### 4. 【自己都不知道的天赋彩蛋】
（基于高星等行星或特殊相位逻辑）：找出一个他性格里极其隐秘、甚至被他当成缺点，但在关键时刻能救命的“隐藏超能力”。给它一个硬核的命名，并说明触发条件。

**语气要求：** 极其自信，不容置疑，像是在读取一份已经发生的历史档案。请直接开始你的报告。`;

            const aiResp = await fetch('https://api.deepseek.com/chat/completions', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${key}`},
                body: JSON.stringify({
                    model: "deepseek-chat",
                    messages: [{role: "user", content: prompt}]
                })
            });

            if(!aiResp.ok) throw new Error("AI 响应失败，请检查 Key 余额");
            const aiJson = await aiResp.json();
            const report = aiJson.choices[0].message.content;

            // 4. 显示结果
            document.getElementById('out-name').textContent = document.getElementById('name').value;
            document.getElementById('report-body').innerHTML = report.split('\n').filter(l=>l.trim()).map(l=>`<p class="module-content">${l}</p>`).join('');
            
            document.getElementById('loader').style.display = 'none';
            document.getElementById('report-container').style.display = 'block';
            document.getElementById('save-image-btn').style.display = 'block';
            setStatus("生成成功");

        } catch (e) {
            alert("抱歉，系统遇到阻碍: " + e.message);
            document.getElementById('input-panel').style.display = 'block';
            document.getElementById('loader').style.display = 'none';
            setStatus("运行失败");
        }
    }

    function takeScreenshot() {
        const target = document.getElementById('report-container');
        html2canvas(target, { scale: 2, useCORS: true, backgroundColor: "#f9f6f2" }).then(canvas => {
            const link = document.createElement('a');
            link.download = `Blueprint_Report.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>
</body>
</html>
