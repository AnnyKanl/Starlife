<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生命蓝图 · 诊断版</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        :root { --gold: #b38b4d; --ink: #1a1a1a; --paper: #f9f6f2; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #cfcfcf; font-family: 'Noto Serif SC', serif; color: var(--ink); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .main-container { max-width: 500px; width: 100%; background: var(--paper); box-shadow: 0 10px 50px rgba(0,0,0,0.2); padding: 40px 20px; }
        .config-panel { background: #fff; padding: 20px; border: 1px solid #eee; margin-bottom: 25px; }
        h1 { text-align: center; letter-spacing: 5px; margin-bottom: 30px; color: var(--gold); font-size: 22px; }
        .field { margin-bottom: 15px; }
        label { display: block; font-size: 11px; color: #999; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 1px solid #eee; background: #fafafa; outline: none; }
        .btn-main { width: 100%; padding: 16px; background: var(--ink); color: #fff; border: none; cursor: pointer; font-weight: 600; }
        
        /* 诊断日志区 - 这是排错核心 */
        #debug-console { 
            width: 100%; max-width: 500px; margin-top: 20px; padding: 15px; 
            background: #1e1e1e; color: #00ff00; font-family: monospace; font-size: 12px; 
            border-radius: 5px; overflow-x: auto; display: block;
        }
        .log-item { margin-bottom: 5px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .log-error { color: #ff5555; }

        #report-container { display: none; padding: 35px 20px; background: var(--paper); border: 1px solid #eee; }
        #save-image-btn { display: none; width: 100%; padding: 16px; background: var(--gold); color: #fff; border: none; margin-top: 20px; }
    </style>
</head>
<body>

<div class="main-container">
    <h1>LIFE BLUEPRINT</h1>
    <div class="config-panel" id="input-panel">
        <div class="field"><label>称呼</label><input type="text" id="name" placeholder="Name"></div>
        <div class="field"><label>出生日期</label><input type="date" id="date"></div>
        <div class="field"><label>准确时间</label><input type="time" id="time"></div>
        <div class="field"><label>出生城市</label><input type="text" id="city" placeholder="Shanghai / Sao Paulo"></div>
        <div class="field"><label>DeepSeek Key</label><input type="password" id="key" placeholder="sk-..."></div>
        <button class="btn-main" onclick="run()">同步数据并排错</button>
    </div>

    <div id="report-container">
        <div id="report-body"></div>
    </div>
    <button id="save-image-btn" onclick="takeScreenshot()">保存长图</button>
</div>

<div id="debug-console">
    <div class="log-item">系统就绪，等待输入...</div>
</div>

<script>
    function log(msg, isError = false) {
        const consoleEl = document.getElementById('debug-console');
        const div = document.createElement('div');
        div.className = 'log-item' + (isError ? ' log-error' : '');
        div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        consoleEl.prepend(div);
    }

    async function run() {
        const key = document.getElementById('key').value.trim();
        const city = document.getElementById('city').value.trim();
        const date = document.getElementById('date').value;
        const time = document.getElementById('time').value;

        log("开始任务...");
        if(!key || !city || !date || !time) { log("错误：信息不全", true); return; }

        try {
            // 1. 定位
            log(`正在搜寻城市: ${city}`);
            const geoResp = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(city)}`);
            const geoData = await geoResp.json();
            if(!geoData.length) throw new Error("城市定位失败");
            
            const lon = parseFloat(geoData[0].lon);
            const lat = parseFloat(geoData[0].lat);
            const offset = Math.round(lon / 15);
            const tz = (offset >= 0 ? "+" : "-") + Math.abs(offset).toString().padStart(2, '0') + ":00";
            log(`坐标确定: ${lat}, ${lon}，估算时区: ${tz}`);

            // 2. 占星数据 (最容易报错的地方)
            const [y, m, d] = date.split('-');
            const encodedTz = encodeURIComponent(tz);
            const astroUrl = `https://api.vedastro.org/Calculate/AllPlanetData/Location/${lon}/${lat}/Time/${time}/${d}/${m}/${y}/${encodedTz}`;
            
            log(`正在请求占星数据...`);
            const astroResp = await fetch(astroUrl);
            
            // 重要：先拿文本，再转 JSON，防止 Unexpected end of JSON
            const rawText = await astroResp.text();
            log(`服务器原始响应预览: ${rawText.substring(0, 100)}...`);
            
            if(!astroResp.ok) throw new Error(`占星服务器返回错误代码: ${astroResp.status}`);
            
            let astroJson;
            try {
                astroJson = JSON.parse(rawText);
            } catch(e) {
                throw new Error(`数据格式非JSON！原始内容是: ${rawText}`);
            }
            
            const astroData = astroJson.Payload;
            log("占星数据获取成功，发送至 AI...");

            // 3. AI
            const prompt = `你是一位心理洞察大师。数据：${JSON.stringify(astroData).substring(0, 800)}。请解析核心特质、关系模式、家庭印记。严禁占星词汇。`;
            const aiResp = await fetch('https://api.deepseek.com/chat/completions', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${key}`},
                body: JSON.stringify({
                    model: "deepseek-chat",
                    messages: [{role: "user", content: prompt}]
                })
            });

            const aiText = await aiResp.text();
            if(!aiResp.ok) throw new Error(`AI服务器错误: ${aiText}`);
            
            const aiJson = JSON.parse(aiText);
            const report = aiJson.choices[0].message.content;

            // 显示
            document.getElementById('report-body').innerHTML = report.split('\n').map(l => `<p style="line-height:2; margin-bottom:10px;">${l}</p>`).join('');
            document.getElementById('report-container').style.display = 'block';
            document.getElementById('save-image-btn').style.display = 'block';
            document.getElementById('input-panel').style.display = 'none';
            log("全部任务完成！");

        } catch (e) {
            log(`致命错误: ${e.message}`, true);
            console.error(e);
        }
    }

    function takeScreenshot() {
        html2canvas(document.getElementById('report-container'), { scale: 2, useCORS: true, backgroundColor: "#f9f6f2" }).then(canvas => {
            const link = document.createElement('a');
            link.download = `Report.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>
</body>
</html>
